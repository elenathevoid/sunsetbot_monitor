name: Rosy Clouds Afternoon Recheck

on:
  schedule:
    # 每天北京时间 15:23 (UTC 07:23) 执行
    # 避开整点高峰
    - cron: '23 7 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  afternoon-recheck:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行下午Recheck
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SB_CITY: ${{ vars.SB_CITY || '上海' }}
          SB_MODEL: ${{ vars.SB_MODEL || 'EC' }}
        run: python main.py afternoon
