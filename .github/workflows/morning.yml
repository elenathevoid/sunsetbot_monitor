name: Daily Sunset Glow Morning Report

on:
  schedule:
    # 每天北京时间 08:17 (UTC 00:17) 执行
    # 避开整点和UTC午夜高峰, 减少被GitHub跳过的概率
    - cron: '17 0 * * *'
  workflow_dispatch:  # 支持手动触发, 方便测试

jobs:
  morning-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 执行早晨推送
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          SB_CITY: ${{ vars.SB_CITY || '上海' }}
          SB_MODEL: ${{ vars.SB_MODEL || 'EC' }}
        run: python main.py morning
